name: herbpairiam
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  # CUDA runtime (comment out for CPU-only)
  - cuda-toolkit>=13.0,<14
  - numpy>=2.4,<3
  - scipy>=1.17,<2
  - pandas>=3.0,<4
  - scikit-learn>=1.8,<2
  - tqdm>=4.67
  - networkx>=3.6
  - joblib>=1.5
  - matplotlib>=3.10
  - pip
  - pip:
    - torch==2.11.0
    - torchvision==0.26.0
    - torchaudio==2.11.0
    - torch_geometric==2.7.0
    - xgboost==3.2.0
